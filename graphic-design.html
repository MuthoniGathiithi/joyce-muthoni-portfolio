<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Graphic design portfolio showcasing creative work and design projects" />
  <title>Graphic Design Portfolio</title>
  <style>
    :root {
      --bg: #000000;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0 0 0.5rem 0;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--muted);
      margin: 0;
    }

    h2 {
      font-size: 1.5rem;
      margin: 2.5rem 0 1.5rem 0;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    p {
      color: var(--muted);
      margin: 0 0 1rem 0;
    }

    ul {
      color: var(--muted);
      padding-left: 1.5rem;
      margin: 0;
    }

    li {
      margin-bottom: 0.5rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .gallery-item:hover {
      transform: scale(1.02);
    }

    .gallery-item img,
    .gallery-item video {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover img,
    .gallery-item:hover video {
      transform: scale(1.03);
    }

    .gallery-item video {
      background: var(--bg);
    }

    .gallery-item-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.4;
    }

    .navigation {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      color: var(--accent);
      font-size: 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .back-link:hover {
      transform: translateX(-4px);
    }

    .back-link:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--accent);
      color: white;
      padding: 0.5rem 1rem;
      text-decoration: none;
      z-index: 100;
    }

    .skip-link:focus {
      top: 0;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }

    .modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content img,
    .modal-content video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      border-radius: 8px;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: var(--text);
      font-size: 2rem;
      cursor: pointer;
      transition: color 0.2s ease;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .modal-close {
        top: 1rem;
        right: 1rem;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 50%;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <div id="imageModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close modal">&times;</button>
      <img id="modalImage" alt="" />
    </div>
  </div>

  <main id="main">
    <header>
      <h1>Graphic Design Portfolio</h1>
      <p class="subtitle">Creative design work and visual projects</p>
    </header>

    <section>
      <h2>Featured Work</h2>
      <div class="gallery">
        <div class="gallery-item">
          <video width="100%" height="auto" controls aria-label="UN Video Practice">
            <source src="assets/GathithiJoyce_UNON_JO276069_Task5_Video.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
          <p class="gallery-item-title">UN Video Practice</p>
        </div>
        <div class="gallery-item">
          <img src="assets/UNENVIRONMENTDAYPRACTISE2.png" alt="UN Environment Day Design" />
          <p class="gallery-item-title">UN Environment Day</p>
        </div>
        <div class="gallery-item">
          <img src="assets/UNNAIROBIRESILIENCEFORUM.png" alt="UN Nairobi Resilience Forum" />
          <p class="gallery-item-title">Nairobi Resilience Forum</p>
        </div>
        <div class="gallery-item">
          <img src="assets/UNenviromnet day practise.png" alt="UN Environment Day Practice Design" />
          <p class="gallery-item-title">Reading Practice</p>
        </div>
        <div class="gallery-item">
          <img src="assets/alamaaipromoimage.png" alt="Alama AI Promo Image" />
          <p class="gallery-item-title">Alama Promo Facebook</p>
        </div>
        <div class="gallery-item">
          <img src="assets/invitationcard.png" alt="Invitation Card Design" />
          <p class="gallery-item-title">Graduation Invitation</p>
        </div>
      </div>
    </section>

    <nav class="navigation">
      <a href="index.html" class="back-link">← Back to portfolio</a>
    </nav>
  </main>

  <script>
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const modalClose = document.querySelector('.modal-close');
    const galleryImages = document.querySelectorAll('.gallery-item img');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        modalImage.src = img.src;
        modalImage.alt = img.alt;
        modal.classList.add('active');
      });
    });

    modalClose.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        modal.classList.remove('active');
      }
    });
  </script>
</body>
</html>
