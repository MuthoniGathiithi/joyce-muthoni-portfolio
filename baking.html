<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baking Inspiration</title>
  <style>
    :root { --bg:#ffffff; --panel:#ffffff; --text:#e5e7eb; --muted:#94a3b8; --blue:#2563eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    .page { max-width:900px; margin:0 auto; padding:2.5rem 1.25rem 4rem; }
    a { color:var(--blue); text-decoration:none; }
    .card { background:var(--panel); border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:1.5rem; margin-bottom:1rem; }
    h1 { font-size:2rem; margin-bottom:.5rem; }
    p { color:var(--muted); }
  
    .back { display:inline-block; margin-top:1rem; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      
      
        <img src="assets/cake.jpeg" alt="A cake" />

      <a class="back" href="index.html">← Back to portfolio</a>
    </div>
  </div>
</body>
</html>
